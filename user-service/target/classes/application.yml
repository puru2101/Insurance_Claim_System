# ============================================================
#  User Service - Application Configuration
# ============================================================

spring:
  application:
    name: USER-SERVICE

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/insurance_user_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:insurance_app}
    password: ${DB_PASSWORD:AppPass123!}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: UserServiceHikariPool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: ${SERVER_PORT:8082}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME:eureka-admin}:${EUREKA_PASSWORD:eureka-secret}@${EUREKA_HOST:localhost}:8761/eureka/
    register-with-eureka: true
    fetch-registry: false
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

jwt:
  secret: ${JWT_SECRET:InsuranceClaimSystem-SuperSecret-Key-2024-ChangeInProduction!}

# File upload config
app:
  upload:
    dir: ${UPLOAD_DIR:uploads}
    base-url: ${UPLOAD_BASE_URL:http://localhost:8082/files}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.insurance.user: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/user-service.log

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
    com.insurance.user: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
